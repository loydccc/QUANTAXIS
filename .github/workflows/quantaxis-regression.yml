name: QUANTAXIS Regression

on:
  push:
    branches:
      - master
      - main
    paths:
      - .github/workflows/quantaxis-regression.yml
      - api/**
      - scripts/api_regression_*.py
      - scripts/watchdog_cleanup_stale_status.py
      - scripts/daily_pipeline.py
      - scripts/shadow_run_day.py
      - scripts/health_index_daily_cache.py
      - requirements-api.txt
  pull_request:
    paths:
      - .github/workflows/quantaxis-regression.yml
      - api/**
      - scripts/api_regression_*.py
      - scripts/watchdog_cleanup_stale_status.py
      - scripts/daily_pipeline.py
      - scripts/shadow_run_day.py
      - scripts/health_index_daily_cache.py
      - requirements-api.txt

jobs:
  api-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt

      - name: Compile key scripts
        run: |
          python -m py_compile \
            api/signals_impl.py \
            scripts/api_regression_run_endpoints.py \
            scripts/api_regression_signal_repro_contract.py \
            scripts/watchdog_cleanup_stale_status.py \
            scripts/health_index_daily_cache.py \
            scripts/shadow_run_day.py

      - name: Run /run endpoint regression
        run: python scripts/api_regression_run_endpoints.py

      - name: Run signal reproducibility contract regression
        run: python scripts/api_regression_signal_repro_contract.py
